global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  insecure: true
  dashboard: true
  debug: true

entryPoints:
  # web:
    # address: ':80'
  relay:
    address: ':8000'
  server:
    address: ':8080'
  traefik:
    address: ':8081'

providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
    network: phirepass-network
  file:
    watch: true
    filename: /traefik.yml

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
  format: common
